kind = "web"
previewPath = "/"
title = "КадастрПро"
version = "1.0.0"
id = "artifacts/kadastr-pro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19892

[services.development]
run = "pnpm --filter @workspace/kadastr-pro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kadastr-pro", "run", "build" ]
publicDir = "artifacts/kadastr-pro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19892"
BASE_PATH = "/"
